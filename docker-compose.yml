services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: home_fixer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: new_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn --bind 0.0.0.0:8000 home_fixer.wsgi:application
    "
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: